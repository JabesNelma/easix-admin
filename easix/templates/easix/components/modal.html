{# Modal Component #}

<div x-data="modal()"
     x-show="open"
     x-cloak
     @modal-show.window="show()"
     @modal-hide.window="hide()"
     class="modal-overlay"
     role="dialog"
     aria-modal="true">
    
    <div class="modal {{ size|default:'modal-lg' }} {{ class|default:'' }}"
         @click.stop
         x-transition:enter="ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="ease-in duration-200"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95">
        
        {# Header #}
        {% if title %}
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
            <h3 class="text-lg font-semibold text-gray-900">{{ title }}</h3>
            <button type="button" 
                    class="p-2 text-gray-400 hover:text-gray-600 rounded-lg hover:bg-gray-100"
                    @click="hide()">
                {{ "x"|icon }}
            </button>
        </div>
        {% endif %}
        
        {# Body #}
        <div class="px-6 py-4">
            {% block content %}
                {{ content|safe }}
            {% endblock %}
        </div>
        
        {# Footer #}
        {% if show_footer|default:True %}
        <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-gray-200 bg-gray-50">
            {% if show_cancel|default:True %}
            <button type="button" 
                    class="btn btn-secondary"
                    @click="hide()">
                {{ cancel_label|default:'Cancel' }}
            </button>
            {% endif %}
            
            {% if show_confirm|default:True %}
            <button type="button" 
                    class="btn {% if confirm_style == 'danger' %}btn-danger{% elif confirm_style == 'success' %}btn-success{% else %}btn-primary{% endif %}"
                    @click="confirm && confirm()">
                {{ confirm_label|default:'Save' }}
            </button>
            {% endif %}
        </div>
        {% endif %}
    </div>
</div>
