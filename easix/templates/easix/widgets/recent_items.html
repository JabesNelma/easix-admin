{# Recent Items Widget #}
<div class="card">
    <div class="card-header">
        <h3 class="text-lg font-semibold text-gray-900">{{ title }}</h3>
    </div>
    <div class="card-body">
        <div class="space-y-3">
            {% for item in items %}
            <a href="{% url 'easix:model_detail' model_app model_name item.pk %}"
               class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50 transition-colors">
                <div class="flex-shrink-0 w-10 h-10 bg-indigo-100 rounded-lg flex items-center justify-center text-indigo-600">
                    {{ "document-text"|icon }}
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-gray-900 truncate">{{ item.display|default:item.str }}</p>
                </div>
                {{ "chevron-right"|icon }}
            </a>
            {% empty %}
            <p class="text-sm text-gray-500 text-center py-4">No items yet</p>
            {% endfor %}
        </div>
    </div>
</div>
