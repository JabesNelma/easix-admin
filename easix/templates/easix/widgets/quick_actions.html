{# Quick Actions Widget #}
{% load easix_tags %}
<div class="card">
    <div class="card-header">
        <h3 class="text-lg font-semibold text-gray-900">{{ title }}</h3>
    </div>
    <div class="card-body">
        <div class="grid grid-cols-1 gap-2">
            {% for action in actions %}
            <a href="{{ action.url }}"
               class="flex items-center gap-3 p-3 rounded-lg border border-gray-200 hover:border-indigo-500 hover:bg-indigo-50 transition-colors">
                <div class="w-10 h-10 bg-indigo-100 rounded-lg flex items-center justify-center text-indigo-600">
                    {{ action.icon|icon }}
                </div>
                <span class="font-medium text-gray-900">{{ action.label }}</span>
            </a>
            {% empty %}
            <p class="text-sm text-gray-500 text-center py-4">No quick actions configured</p>
            {% endfor %}
        </div>
    </div>
</div>
